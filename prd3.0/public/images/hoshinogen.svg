<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#74B9FF"/>
      <stop offset="50%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#74B9FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect fill="url(#bg)" width="400" height="400"/>
  <circle cx="200" cy="180" r="80" fill="rgba(255,255,255,0.15)"/>
  <text x="200" y="210" text-anchor="middle" fill="white" font-size="72" font-family="sans-serif" font-weight="bold" filter="url(#shadow)">星</text>
  <text x="200" y="340" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="18" font-family="sans-serif">星野源</text>
</svg>